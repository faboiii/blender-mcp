<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pokemon Karten Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark pokemon-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-collection-fill me-2"></i>Pokemon Tracker
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Sammlung</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/suche"><i class="bi bi-search me-1"></i>Karten suchen</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/karte/neu"><i class="bi bi-plus-circle me-1"></i>Manuell hinzufügen</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/vergleich"><i class="bi bi-bar-chart-steps me-1"></i>Vergleich</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/statistiken"><i class="bi bi-graph-up me-1"></i>Statistiken</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top mt-5">
  <small>Pokemon Karten Tracker &mdash; Daten von <a href="https://pokemontcg.io" target="_blank">pokemontcg.io</a></small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
